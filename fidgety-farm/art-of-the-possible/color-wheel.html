<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Wheel Dial - Fidgety Farm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: hsl(0, 100%, 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            transition: background-color 0.1s ease;
        }

        .container {
            position: relative;
            width: 400px;
            height: 400px;
            max-width: 90vw;
            max-height: 90vw;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: grab;
            touch-action: none;
        }

        canvas:active {
            cursor: grabbing;
        }

        .center-hole {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: white;
            font-weight: bold;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .color-display {
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .color-value {
            font-size: 0.9rem;
            margin-top: 0.5rem;
            opacity: 0.9;
            font-family: monospace;
        }

        .hint {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 0.9rem;
            opacity: 0.8;
            text-align: center;
            pointer-events: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        @media (max-width: 600px) {
            .container {
                width: 300px;
                height: 300px;
            }
            
            .center-hole {
                width: 100px;
                height: 100px;
            }
            
            .color-display {
                font-size: 2rem;
            }
            
            .color-value {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="colorWheel"></canvas>
        <div class="center-hole">
            <div class="color-display" id="colorDisplay">0°</div>
            <div class="color-value" id="colorValue">hsl(0, 100%, 50%)</div>
        </div>
    </div>
    <div class="hint">Drag around the wheel to change colors</div>

    <script>
        const canvas = document.getElementById('colorWheel');
        const ctx = canvas.getContext('2d');
        const colorDisplay = document.getElementById('colorDisplay');
        const colorValue = document.getElementById('colorValue');

        let isDragging = false;
        let currentHue = 0;
        let lastAngle = 0;

        // Set canvas size for high DPI displays
        function setupCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            
            ctx.scale(dpr, dpr);
            
            return rect;
        }

        // Draw the color wheel donut chart
        function drawColorWheel(centerX, centerY, radius, holeRadius) {
            const numSegments = 360;
            
            for (let i = 0; i < numSegments; i++) {
                const startAngle = (i - 90) * (Math.PI / 180);
                const endAngle = (i + 1 - 90) * (Math.PI / 180);
                const hue = i;
                
                // Create gradient from outer to inner
                const gradient = ctx.createRadialGradient(
                    centerX, centerY, holeRadius,
                    centerX, centerY, radius
                );
                
                gradient.addColorStop(0, `hsla(${hue}, 100%, 60%, 0.3)`);
                gradient.addColorStop(0.5, `hsla(${hue}, 100%, 50%, 0.4)`);
                gradient.addColorStop(1, `hsla(${hue}, 100%, 40%, 0.5)`);
                
                ctx.beginPath();
                ctx.moveTo(centerX + holeRadius * Math.cos(startAngle), centerY + holeRadius * Math.sin(startAngle));
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.lineTo(centerX + holeRadius * Math.cos(endAngle), centerY + holeRadius * Math.sin(endAngle));
                ctx.arc(centerX, centerY, holeRadius, endAngle, startAngle, true);
                ctx.closePath();
                
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            // Draw indicator line for current hue
            const indicatorAngle = (currentHue - 90) * (Math.PI / 180);
            const indicatorRadius = (radius + holeRadius) / 2;
            
            ctx.beginPath();
            ctx.moveTo(centerX + holeRadius * Math.cos(indicatorAngle), centerY + holeRadius * Math.sin(indicatorAngle));
            ctx.lineTo(centerX + radius * Math.cos(indicatorAngle), centerY + radius * Math.sin(indicatorAngle));
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // Get angle from center to point
        function getAngle(x, y, centerX, centerY) {
            let angle = Math.atan2(y - centerY, x - centerX);
            angle = angle * (180 / Math.PI);
            angle = (angle + 90 + 360) % 360;
            return angle;
        }

        // Update color based on hue
        function updateColor(hue) {
            currentHue = hue;
            const color = `hsl(${hue}, 100%, 50%)`;
            document.body.style.backgroundColor = color;
            colorDisplay.textContent = `${Math.round(hue)}°`;
            colorValue.textContent = color;
            
            const rect = canvas.getBoundingClientRect();
            drawColorWheel(rect.width / 2, rect.height / 2, rect.width / 2, rect.width * 0.15);
        }

        // Handle input events
        function handleInput(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const newAngle = getAngle(clientX, clientY, centerX, centerY);
            
            // Determine direction and update hue
            if (isDragging) {
                let delta = newAngle - lastAngle;
                
                // Handle wrapping around 0/360
                if (delta > 180) delta -= 360;
                if (delta < -180) delta += 360;
                
                // Update hue with smooth movement
                currentHue = (currentHue + delta + 360) % 360;
                updateColor(currentHue);
            }
            
            lastAngle = newAngle;
        }

        // Mouse events
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            const rect = canvas.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            lastAngle = getAngle(e.clientX, e.clientY, centerX, centerY);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                handleInput(e.clientX, e.clientY);
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            lastAngle = getAngle(touch.clientX, touch.clientY, centerX, centerY);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging) {
                const touch = e.touches[0];
                handleInput(touch.clientX, touch.clientY);
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        canvas.addEventListener('touchcancel', () => {
            isDragging = false;
        });

        // Initial setup
        const rect = setupCanvas();
        drawColorWheel(rect.width / 2, rect.height / 2, rect.width / 2, rect.width * 0.15);

        // Handle window resize
        window.addEventListener('resize', () => {
            const newRect = setupCanvas();
            drawColorWheel(newRect.width / 2, newRect.height / 2, newRect.width / 2, newRect.width * 0.15);
        });
    </script>
</body>
</html>
